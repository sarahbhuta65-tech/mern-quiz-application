<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result | SmartQuiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { padding: 0; }

        .page-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Score Card */
        .score-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            text-align: center;
            position: sticky;
            top: 88px;
        }

        .score-ring-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 24px; }
        .score-ring-wrap svg { transform: rotate(-90deg); }
        .ring-bg { fill: none; stroke: var(--bg-surface); stroke-width: 10; }
        .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
        .score-center {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .score-pct { font-size: 2.2rem; font-weight: 800; }
        .score-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .student-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .status-pill { display: inline-block; margin: 12px 0 24px; padding: 6px 20px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; }
        .status-pass { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .status-fail { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .status-dq   { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }

        .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .stat-row:last-of-type { border-bottom: none; }
        .stat-row span:last-child { font-weight: 600; color: var(--text-primary); }

        .security-alert {
            display: none;
            background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.25);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 0.82rem;
            color: #f59e0b;
            margin: 16px 0;
            text-align: left;
        }

        .card-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        .card-actions .btn-primary, .card-actions .btn-outline { justify-content: center; }

        /* Right column */
        .right-col { display: flex; flex-direction: column; gap: 20px; }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
        }
        .section-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            border-left: 3px solid transparent;
        }
        .history-item.pass { border-left-color: var(--pass); }
        .history-item.fail { border-left-color: var(--fail); }
        .history-item .code { font-weight: 600; font-size: 0.9rem; }
        .history-item .date { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
        .history-item .pct { font-weight: 700; font-size: 0.9rem; }

        .lb-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 16px;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
        }
        .lb-medal { font-size: 1.2rem; width: 28px; text-align: center; }
        .lb-name { flex: 1; font-weight: 600; font-size: 0.9rem; }
        .lb-score { font-weight: 700; color: #a78bfa; }
        .lb-item.gold { border: 1px solid rgba(251,191,36,0.3); background: rgba(251,191,36,0.05); }

        canvas#certCanvas { display: none; }

        @media (max-width: 768px) {
            .page-wrap { grid-template-columns: 1fr; }
            .score-card { position: static; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="brand grad-text"><i class="fas fa-brain" style="margin-right:8px;"></i>SmartQuiz</div>
    <div class="nav-links"><a href="index.html">Home</a></div>
</nav>

<div class="page-wrap">
    <!-- Left: Score Card -->
    <div class="score-card">
        <div class="score-ring-wrap">
            <svg width="160" height="160" viewBox="0 0 160 160">
                <circle class="ring-bg" cx="80" cy="80" r="70"/>
                <circle class="ring-fill" id="ringFill" cx="80" cy="80" r="70"
                    stroke="url(#ringGrad)"
                    stroke-dasharray="439.8"
                    stroke-dashoffset="439.8"/>
                <defs>
                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#8b5cf6"/>
                        <stop offset="100%" stop-color="#06b6d4"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="score-center">
                <span class="score-pct grad-text" id="resPercent">0%</span>
                <span class="score-label">Score</span>
            </div>
        </div>

        <div class="student-name" id="resName">---</div>
        <div class="status-pill" id="status">---</div>

        <div class="security-alert" id="securityNote">
            <i class="fas fa-exclamation-triangle"></i> Tab switching detected. This attempt has been flagged.
        </div>

        <div class="stat-row"><span>Total Questions</span><span id="resTotal">0</span></div>
        <div class="stat-row"><span>Correct Answers</span><span id="resCorrect">0</span></div>

        <div class="card-actions">
            <div id="passActions" style="display:none;">
                <button class="btn-primary" onclick="generateCertificate()" style="width:100%; justify-content:center; background: linear-gradient(135deg,#f59e0b,#fbbf24); margin-bottom:10px;">
                    <i class="fas fa-certificate"></i> Download Certificate
                </button>
            </div>
            <button class="btn-outline" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i> Back to Home
            </button>
        </div>
        <canvas id="certCanvas" width="800" height="600"></canvas>
    </div>

    <!-- Right: History + Leaderboard -->
    <div class="right-col">
        <div class="section-card">
            <h3><i class="fas fa-history" style="color:#8b5cf6;"></i> Your Quiz History</h3>
            <div id="studentHistoryList"><p style="color:var(--text-muted); font-size:0.9rem;">Loading...</p></div>
        </div>

        <div class="section-card">
            <h3><i class="fas fa-trophy" style="color:#f59e0b;"></i> Leaderboard</h3>
            <div id="leaderboardList"><p style="color:var(--text-muted); font-size:0.9rem;">Loading...</p></div>
        </div>
    </div>
</div>

<script src="result.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment | SmartQuiz</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

        .quiz-wrap { width: 100%; max-width: 780px; }

        /* Start Screen */
        .start-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 56px 48px;
            text-align: center;
        }
        .start-icon {
            width: 72px; height: 72px;
            background: var(--grad);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 28px;
        }
        .start-card h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .start-card p { color: var(--text-soft); margin-bottom: 36px; }
        .start-inputs { display: flex; flex-direction: column; gap: 14px; max-width: 380px; margin: 0 auto 28px; }
        .start-card .btn-primary { padding: 14px 40px; font-size: 1rem; }

        /* Quiz Screen */
        .quiz-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
        }

        .quiz-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .secure-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.78rem; font-weight: 600;
            color: #10b981;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            padding: 5px 12px; border-radius: 20px;
        }
        .timer-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.88rem; font-weight: 700;
            color: #a78bfa;
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.2);
            padding: 6px 14px; border-radius: 20px;
        }

        .progress-bar {
            height: 5px;
            background: var(--bg-surface);
            border-radius: 10px;
            margin-bottom: 32px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--grad);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .q-meta { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .q-text { font-size: 1.3rem; font-weight: 600; line-height: 1.5; margin-bottom: 32px; color: var(--text-primary); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 32px; }

        .option-card {
            background: var(--bg-surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
        }
        .option-card:hover { border-color: rgba(139,92,246,0.4); background: var(--bg-hover); }
        .option-card.selected { border-color: #8b5cf6; background: rgba(139,92,246,0.1); }

        .option-key {
            width: 32px; height: 32px; flex-shrink: 0;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; color: var(--text-muted);
            transition: all 0.2s;
        }
        .option-card.selected .option-key { background: #8b5cf6; border-color: #8b5cf6; color: #fff; }
        .option-label { font-size: 0.92rem; color: var(--text-soft); }

        .quiz-footer { display: flex; justify-content: space-between; align-items: center; }
        .quiz-footer .btn-primary { padding: 13px 32px; }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .start-card, .quiz-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
<div class="quiz-wrap">

    <div id="startScreen" class="start-card">
        <div class="start-icon"><i class="fas fa-lock"></i></div>
        <h2>Secure Assessment</h2>
        <p>Enter your details to begin. Tab switching will end the quiz immediately.</p>
        <div class="start-inputs">
            <input class="input" type="text" id="studentName" placeholder="Full Name">
            <input class="input" type="text" id="quizCode" placeholder="Quiz Access Code">
        </div>
        <button class="btn-primary" onclick="startQuiz()"><i class="fas fa-play"></i> Begin Test</button>
    </div>

    <div id="quizSection" style="display:none;" class="quiz-card">
        <div class="quiz-topbar">
            <div class="secure-badge"><i class="fas fa-shield-alt"></i> Proctored</div>
            <div class="timer-badge"><i class="fas fa-clock"></i> <span id="timer">05:00</span></div>
        </div>

        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>

        <div class="q-meta" id="qCount">Question 1 of 10</div>
        <div class="q-text" id="questionText">Loading...</div>

        <div class="options-grid" id="options"></div>

        <div class="quiz-footer">
            <span style="font-size:0.82rem; color:var(--text-muted);"><i class="fas fa-eye" style="margin-right:4px;"></i>Monitoring active</span>
            <button class="btn-primary" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

</div>
<script src="quiz.js"></script>
<script>
    // Pre-fill student name from login session
    const savedName = localStorage.getItem("studentName");
    if (savedName) {
        const nameInput = document.getElementById("studentName");
        nameInput.value = savedName;
        nameInput.readOnly = true;
        nameInput.style.opacity = "0.6";
        nameInput.style.cursor = "not-allowed";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SmartQuiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 60px;
            position: relative;
            overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .left-panel .logo-wrap {
            position: relative;
            text-align: center;
        }
        .left-panel img { width: 100px; filter: drop-shadow(0 0 20px rgba(139,92,246,0.5)); margin-bottom: 20px; }
        .left-panel h2 { font-size: 1.8rem; font-weight: 800; }
        .left-panel p { color: var(--text-muted); margin-top: 8px; font-size: 0.9rem; }

        .features { margin-top: 40px; display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 280px; }
        .feature-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 16px;
            font-size: 0.85rem; color: var(--text-soft);
        }
        .feature-item i { color: #8b5cf6; width: 16px; }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
        }
        .auth-box h3 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .auth-box .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

        .auth-box .btn-primary { width: 100%; justify-content: center; padding: 14px; font-size: 0.95rem; margin-top: 8px; }

        .toggle-row { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--text-muted); }
        .toggle-row span { color: #a78bfa; font-weight: 600; cursor: pointer; }
        .toggle-row span:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .left-panel { display: none; }
        }
    </style>
</head>
<body>

<div class="left-panel">
    <div class="logo-wrap">
        <img src="logo5.png" alt="Logo">
        <h2 class="grad-text">SmartQuiz</h2>
        <p>Assess. Analyze. Achieve.</p>
    </div>
    <div class="features">
        <div class="feature-item"><i class="fas fa-shield-alt"></i> Anti-cheat tab monitoring</div>
        <div class="feature-item"><i class="fas fa-robot"></i> AI-generated quizzes</div>
        <div class="feature-item"><i class="fas fa-chart-bar"></i> Real-time analytics</div>
        <div class="feature-item"><i class="fas fa-certificate"></i> Downloadable certificates</div>
    </div>
</div>

<div class="right-panel">
    <div class="auth-box">
        <h3 id="authTitle">Welcome back</h3>
        <p class="subtitle" id="authSubtitle">Sign in to your student account</p>

        <div class="form-group">
            <label>Username</label>
            <input class="input" type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input class="input" type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn-primary" onclick="processAuth()">
            <i class="fas fa-arrow-right"></i> <span id="btnText">Sign In</span>
        </button>

        <div class="toggle-row">
            <span id="toggleMsg">Don't have an account?</span>
            <span onclick="toggleForm()" id="toggleLink"> Sign Up</span>
        </div>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById("authTitle").innerText = isLogin ? "Welcome back" : "Create account";
        document.getElementById("authSubtitle").innerText = isLogin ? "Sign in to your student account" : "Join SmartQuiz today";
        document.getElementById("btnText").innerText = isLogin ? "Sign In" : "Create Account";
        document.getElementById("toggleMsg").innerText = isLogin ? "Don't have an account?" : "Already have an account?";
        document.getElementById("toggleLink").innerText = isLogin ? " Sign Up" : " Sign In";
    }

    async function processAuth() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) return alert("Please fill in all fields.");

        const endpoint = isLogin ? '/api/login' : '/api/signup';
        try {
            const response = await fetch(`http://localhost:8000${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (response.ok) {
                if (isLogin) {
                    sessionStorage.setItem("userLoggedIn", "true");
                    localStorage.setItem("studentName", username);
                    localStorage.setItem("authToken", data.token);
                    window.location.href = "index.html";
                } else {
                    alert("Account created! Please sign in.");
                    toggleForm();
                    document.getElementById("username").value = "";
                    document.getElementById("password").value = "";
                }
            } else {
                alert(data.error || "Authentication failed.");
            }
        } catch (err) {
            alert("Connection failed. Make sure the server is running on port 8000.");
        }
    }
</script>
</body>
</html>
